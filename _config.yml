# Minimal Academic Personal Website Config (Stable Version)

# Basic Site Settings
locale: "en-US"
site_theme: "default"

title: "Lijing Zhu | Data Science & ML Research"
title_separator: "-"
name: "Lijing Zhu"
description: "Academic portfolio and research in data science and machine learning"

# ⚠️ 这里必须和 repo 名一致
url: "https://lijingzhu1.github.io"
baseurl: ""
repository: "https://github.com/lijingzhu1/lijingzhu1.github.io"

# Author Information
author:
  avatar: "profile.png"
  name: "Lijing Zhu"
  bio: "Ph.D. in Data Science from Bowling Green State University. Research focus on machine learning and graph-based deep learning. Data scientist at University of Houston-Clear Lake."
  location: "TX"
  employer: "University of Houston-Clear Lake"
  email: "zhul@uhcl.edu"

  # Academic Links
  googlescholar: "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"
  github: "lijingzhu1"
  linkedin: ""
  orcid: ""

# Basic Settings
breadcrumbs: false
words_per_minute: 160
future: true

# Markdown
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true

# Collections (保留 academicpages 必需)
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

# Files
include:
  - _pages

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock

# Output
permalink: /:categories/:title/
timezone: "Etc/UTC"

# Plugins (GitHub Pages safe)
plugins:
  - jekyll-feed
  - jekyll-sitemap
